---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      day: 'monday'
      time: '05:00'
      timezone: 'Europe/Paris'
    labels:
      - dependencies
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: npm
    directory: "/"
    labels:
      - dependencies
    schedule:
      interval: monthly
      day: 'monday'
      time: '05:00'
      timezone: 'Europe/Paris'
    cooldown:
      default-days: 7
    versioning-strategy: increase
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
  - package-ecosystem: npm
    directory: "/color-modes"
    labels:
      - dependencies
    schedule:
      interval: monthly
      day: 'monday'
      time: '05:00'
      timezone: 'Europe/Paris'
    cooldown:
      default-days: 7
    versioning-strategy: increase
    ignore:
      - dependency-name: "stylelint"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
